name: Crustgraver Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: node20

    defaults:
      run:
        working-directory: crustgraver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y pkg-config libudev-dev

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Show versions
        run: |
          rustc --version
          cargo --version

      - name: Build release
        run: cargo build --release

      - name: Prepare release files
        run: |
          mkdir dist

          cp target/release/crustgraver dist/

          tar -czf crustgraver-linux-x86_64.tar.gz -C dist crustgraver

      - name: Create Forgejo release
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create the release
          curl -sf -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            "$FORGEJO_URL/api/v1/repos/$REPO/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}"

          # Get the release ID
          RELEASE_ID=$(curl -sf \
            -H "Authorization: token $FORGEJO_TOKEN" \
            "$FORGEJO_URL/api/v1/repos/$REPO/releases/tags/$TAG" \
            | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

          # Upload the asset
          curl -sf -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "$FORGEJO_URL/api/v1/repos/$REPO/releases/$RELEASE_ID/assets?name=crustgraver-linux-x86_64.tar.gz" \
            --data-binary @crustgraver-linux-x86_64.tar.gz
